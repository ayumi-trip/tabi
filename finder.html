<body>

        <div id="result">

          <div class="destination-grid" aria-live="polite"></div>

        <h2 class="related-heading">関連する記事</h2>

        <div class="diagnosis-actions">
          <button class="secondary" id="backToQuestions" type="button">条件を変える</button>

    </section>
  </main>

  <footer class="footer">

  <script>
    const articles = [

      },

      {

      },
      {

        area: "神奈川・箱根",
        date: "2026.06",

        label: ["箱根", "記念日"],

        url: "/articles/hakone-anniversary-trip/"
      },
      {
        title: "由布院は週末温泉旅に向いている？街歩きと宿時間で組む1泊2日",
        area: "大分・由布院",
        date: "2026.06",
        tags: ["onsen", "couple", "solo"],
        label: ["由布院", "週末旅"],
        image: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=900&q=80",
        url: "/articles/yufuin-onsen-weekend/"
      }
    ];

    const renderCards = (items, target) => {
      target.innerHTML = items.map((article) => `
        <a class="article-card" href="${article.url || '#'}">
          <div class="thumb" style="background-image:url('${article.image}')"></div>
          <div class="card-body">
            <div class="card-tags">${article.label.map((tag) => `<span class="pill">${tag}</span>`).join("")}</div>
            <h3>${article.title}</h3>
            <div class="card-meta"><span>${article.area}</span><span>${article.date}</span></div>
          </div>
        </a>
      `).join("");
    };

    const finder = document.getElementById("finder");
    const questionScreen = document.getElementById("questionScreen");
    const resultScreen = document.getElementById("resultScreen");
    const relatedGrid = document.getElementById("relatedGrid");
    const getActiveValue = (name) => finder.querySelector(`.choice.is-active[data-${name}]`)?.dataset[name];
    const getActiveValues = (name) => [...finder.querySelectorAll(`.choice.is-active[data-${name}]`)].map((item) => item.dataset[name]);

    const destinations = [
      {
        name: "石垣島・竹富島",
        summary: "海、離島らしさ、非日常感をまとめて楽しみたい人向け。",
        tags: ["海", "非日常", "島"],
        links: ["沖縄離島の記事へ", "1泊2日の島旅"],
        weights: { sea: 5, escape: 4, nature: 2, slow: 1, gourmet: 1, solo: 1, couple: 1, friend: 1, none: 2, maybe: 2, yes: 1 }
      },
      {
        name: "宮古島",
        summary: "きれいな海とリゾート感を重視する旅に。車があると回りやすい候補。",
        tags: ["海", "記念日", "絶景"],
        links: ["宮古島の宿を比較", "沖縄離島タグ"],
        weights: { sea: 5, escape: 4, anniversary: 3, nature: 2, couple: 2, friend: 1, maybe: 2, yes: 3 }
      },
      {
        name: "直島・豊島",
        summary: "島旅に文化体験を足したい人向け。車なしでも計画しやすい島候補。",
        tags: ["島", "文化体験", "街歩き"],
        links: ["瀬戸内の島旅", "文化体験タグ"],
        weights: { sea: 3, culture: 5, walk: 3, escape: 3, solo: 2, couple: 1, friend: 2, none: 3, maybe: 2 }
      },
      {
        name: "指宿",
        summary: "砂むし温泉、海沿い宿、観光列車を組み合わせやすい温泉地。",
        tags: ["温泉", "海", "車なし"],
        links: ["指宿ひとり旅", "指宿は車なしで行ける？"],
        weights: { onsen: 5, sea: 3, slow: 3, solo: 2, couple: 1, anniversary: 2, none: 4, maybe: 2 }
      },
      {
        name: "熱海",
        summary: "車なしで行きやすく、温泉・海・宿泊導線を作りやすい定番候補。",
        tags: ["温泉", "海", "車なし"],
        links: ["車なし温泉旅", "温泉宿を比較"],
        weights: { onsen: 4, sea: 2, slow: 3, gourmet: 2, anniversary: 2, couple: 1, family: 1, none: 4, maybe: 2 }
      },
      {
        name: "箱根",
        summary: "記念日、温泉宿、美術館、自然をまとめて提案しやすいエリア。",
        tags: ["温泉", "記念日", "自然"],
        links: ["記念日温泉宿", "箱根の宿を比較"],
        weights: { onsen: 5, anniversary: 5, nature: 2, culture: 2, slow: 3, couple: 3, family: 2, none: 2, maybe: 3, yes: 2 }
      },
      {
        name: "奈良",
        summary: "歴史、街歩き、カフェ、記念日ホテルを組み合わせやすい街旅。",
        tags: ["歴史", "街歩き", "グルメ"],
        links: ["奈良カップル旅", "歴史街歩きタグ"],
        weights: { history: 5, walk: 4, gourmet: 3, culture: 3, anniversary: 1, solo: 1, couple: 2, friend: 1, none: 4, maybe: 2 }
      },
      {
        name: "金沢",
        summary: "歴史、文化体験、グルメ、お酒の切り口で広げやすい都市型旅。",
        tags: ["文化体験", "グルメ", "お酒"],
        links: ["金沢街歩き", "地酒旅タグ"],
        weights: { history: 4, culture: 4, gourmet: 4, drink: 4, walk: 3, city: 2, couple: 1, friend: 2, none: 4, maybe: 2 }
      },
      {
        name: "長崎",
        summary: "歴史、夜景、グルメ、異国情緒の非日常感を出しやすい行き先。",
        tags: ["歴史", "非日常", "グルメ"],
        links: ["長崎街歩き", "文化旅タグ"],
        weights: { history: 4, culture: 3, gourmet: 4, escape: 3, walk: 3, couple: 1, friend: 2, none: 3, maybe: 2 }
      },
      {
        name: "男鹿半島",
        summary: "なまはげ文化、温泉、海沿いの絶景を車で回る旅に向く候補。",
        tags: ["自然", "文化体験", "車あり"],
        links: ["男鹿半島と秋田市内2泊3日", "レンタカー導線"],
        weights: { nature: 4, sea: 2, culture: 4, onsen: 2, escape: 2, solo: 1, friend: 1, maybe: 2, yes: 5 }
      },
      {
        name: "由布院",
        summary: "記念日、温泉、のんびり滞在を中心に組み立てやすい温泉地。",
        tags: ["温泉", "記念日", "のんびり"],
        links: ["記念日温泉宿", "由布院の宿を比較"],
        weights: { onsen: 5, anniversary: 4, slow: 4, nature: 2, gourmet: 1, couple: 3, family: 1, none: 2, maybe: 3, yes: 2 }
      },
      {
        name: "神戸",
        summary: "都会、港町、記念日ホテル、グルメを車なしで楽しみやすい候補。",
        tags: ["都会", "記念日", "グルメ"],
        links: ["都会ステイタグ", "ホテルを比較"],
        weights: { city: 5, anniversary: 3, gourmet: 4, walk: 2, drink: 2, couple: 3, friend: 1, none: 4, maybe: 2 }
      }
    ];

    const scoreDestination = (destination, who, car, priorities) => {
      let score = 0;
      priorities.forEach((priority) => {
        score += destination.weights[priority] || 0;
      });
      score += destination.weights[who] || 0;
      score += destination.weights[car] || 0;
      return score;
    };

    const diagnoseTrip = () => {
      const who = getActiveValue("who");
      const car = getActiveValue("car");
      const priorities = getActiveValues("priority");
      return destinations
        .map((destination) => ({
          ...destination,
          score: scoreDestination(destination, who, car, priorities)
        }))
        .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, "ja"))
        .slice(0, 4);
    };

    const renderDiagnosis = () => {
      const items = diagnoseTrip();
      document.getElementById("result").innerHTML = `
        <h3>あなたに合いそうな行き先候補</h3>
        <div class="destination-grid">
          ${items.map((item, index) => `
            <article class="destination-card">
              <span class="destination-rank">${index + 1}</span>
              <h4>${item.name}</h4>
              <div class="destination-tags">${item.tags.map((tag) => `<span>${tag}</span>`).join("")}</div>
              <div class="result-links">${item.links.map((link) => `<a class="small-link" href="#">${link}</a>`).join("")}</div>
            </article>
          `).join("")}
        </div>
      `;
      const selectedPriorities = getActiveValues("priority");
      const selectedWho = getActiveValue("who");
      const related = articles
        .map((article) => ({
          ...article,
          matchScore:
            article.tags.filter((tag) => selectedPriorities.includes(tag)).length +
            (article.tags.includes(selectedWho) ? 1 : 0) +
            (items.some((item) => item.name.includes(article.area.split("・").pop()) || article.title.includes(item.name.split("・")[0])) ? 2 : 0)
        }))
        .sort((a, b) => b.matchScore - a.matchScore)
        .slice(0, 3);
      renderCards(related, relatedGrid);
    };

    finder.addEventListener("click", (event) => {
      const button = event.target.closest(".choice");
      if (!button) return;
      if (button.dataset.priority) {
        button.classList.toggle("is-active");
        if (!finder.querySelector(".choice.is-active[data-priority]")) {
          button.classList.add("is-active");
        }
      } else {
        const key = button.dataset.who ? "who" : "car";
        finder.querySelectorAll(`.choice[data-${key}]`).forEach((choice) => choice.classList.remove("is-active"));
        button.classList.add("is-active");
      }
    });

    document.getElementById("diagnoseButton").addEventListener("click", () => {
      renderDiagnosis();
      questionScreen.hidden = true;
      resultScreen.hidden = false;
      resultScreen.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    document.getElementById("backToQuestions").addEventListener("click", () => {
      resultScreen.hidden = true;
      questionScreen.hidden = false;
      questionScreen.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  </script>
</body>
