  <style>
    :root {
      --ink: #171717;
      --sub: #4f5658;
      --muted: #777f82;
      --line: #e8eaec;
      --paper: #fff;
      --white: #fff;
      --teal: #1f5f8f;
      --teal-2: #f1f6fb;
      --shadow: 0 14px 40px rgba(17, 17, 17, .07);
      --r: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.75;
    }
    a { color: inherit; text-decoration: none; }
    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      padding: 0 clamp(18px, 4vw, 52px);
      background: rgba(255, 255, 255, .92);
      border-bottom: 1px solid rgba(17, 17, 17, .08);
      backdrop-filter: blur(16px);
    }
    .brand-name {
      font-family: "Shippori Mincho", serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .brand-name span { color: var(--teal); }
    .nav-links {
      display: flex;
      gap: 22px;
      color: var(--sub);
      font-size: 13px;
    }
    .wrap {
      width: min(1040px, calc(100% - 40px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }
    .hero h1 {
      margin: 0;
      font-family: "Shippori Mincho", serif;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.2;
    }
    .hero p {
      margin: 14px 0 0;
      color: var(--sub);
      font-size: 15px;
    }
    .filter-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      grid-template-areas:
        "keyword area"
        "tags tags";
      gap: 18px;
      margin-top: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    .filter-box.keyword-filter-box {
      grid-area: keyword;
    }
    .filter-box.area-filter-box {
      grid-area: area;
      max-width: 260px;
      justify-self: end;
      width: 100%;
    }
    .filter-box.tag-filter-box {
      grid-area: tags;
    }
    .filter-box label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
    }
    .filter-box select {
      width: 100%;
      min-height: 44px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--white);
      color: var(--ink);
      font: inherit;
    }
    .filter-box input[type="search"] {
      width: 100%;
      min-height: 46px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--white);
      color: var(--ink);
      font: inherit;
    }
    .tag-filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tag-filter-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--white);
      color: var(--sub);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .18s ease, color .18s ease, border-color .18s ease;
    }
    .tag-filter-chip[aria-pressed="true"] {
      border-color: var(--teal);
      background: var(--teal);
      color: var(--white);
    }
    .tag-filter-chip.is-clear {
      background: #f8f9f9;
      color: var(--ink);
    }
    .article-list {
      margin-top: 24px;
    }
    .article-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px 180px;
      gap: 18px;
      align-items: center;
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }
    .article-row:hover .article-title {
      color: var(--teal);
    }
    body.admin-mode .article-row[data-status="hidden"],
    body.admin-mode .article-row[data-status="review"] {
      background: #fcfcfc;
    }
    .article-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 16px;
      font-weight: 700;
      transition: color .18s ease;
    }
    .review-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      border: 1px solid #d6dadd;
      background: transparent;
      flex: 0 0 auto;
    }
    .review-dot.is-checked {
      border-color: #9ba7b1;
      background: #9ba7b1;
    }
    .management-badges {
      display: none;
      gap: 6px;
      flex-wrap: wrap;
      width: 100%;
    }
    body.admin-mode .management-badges {
      display: inline-flex;
    }
    .management-badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      background: #f3f4f6;
      color: #5b6570;
    }
    .management-badge.tone-published,
    .management-badge.tone-done,
    .management-badge.tone-fixed {
      background: #eef6fb;
      color: #1f5f8f;
    }
    .management-badge.tone-scheduled,
    .management-badge.tone-temp,
    .management-badge.tone-reviewed {
      background: #f5f7ea;
      color: #6a6d2f;
    }
    .management-badge.tone-draft,
    .management-badge.tone-review,
    .management-badge.tone-none,
    .management-badge.tone-todo {
      background: #fbf1f1;
      color: #9b645b;
    }
    .management-badge.tone-hidden {
      background: #eef0f2;
      color: #727b84;
    }
    .management-badge.tone-pending {
      background: #fbf1f1;
      color: #9b645b;
    }
    .article-meta,
    .article-labels {
      color: var(--muted);
      font-size: 13px;
    }
    .article-labels {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pill {
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--teal-2);
      color: var(--teal);
      font-size: 11px;
      font-weight: 700;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding: 28px clamp(18px, 4vw, 52px);
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      background: #f8f9f9;
    }
    .footer-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }
    @media (max-width: 860px) {
      .filter-panel {
        grid-template-columns: 1fr;
        grid-template-areas:
          "keyword"
          "area"
          "tags";
      }
      .filter-box.keyword-filter-box,
      .filter-box.area-filter-box {
        max-width: none;
        justify-self: stretch;
      }
      .article-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .article-labels {
        justify-content: flex-start;
      }
      .nav-links { display: none; }
    }
  </style>
</head>

<script src="../assets/article-registry.js"></script>
  <script>
    const articleList = document.getElementById("articleList");
    const keywordFilter = document.getElementById("keywordFilter");
    const areaFilter = document.getElementById("areaFilter");
    const tagFilterGroup = document.getElementById("tagFilterGroup");
    const tagFilterButtons = [...document.querySelectorAll(".tag-filter-chip[data-tag]")];
    const loadInlineRegistryData = () => {
      const node = document.getElementById("articleRegistryData");
      if (!node) return false;
      try {
        const articles = JSON.parse(node.textContent);
        window.TABINOTE_ARTICLES = articles;
        ensureRegistryUtils();
        return true;
      } catch {
        return false;
      }
    };

    const loadRegistryScript = () => {
      if (window.TABINOTE_ARTICLES && window.TabinoteArticleUtils) {
        return Promise.resolve();
      }
      const candidates = window.location.protocol === "file:"
        ? ["../assets/article-registry.js", "./../assets/article-registry.js"]
        : ["/assets/article-registry.js", "../assets/article-registry.js"];

      return candidates.reduce((promise, src) => {
        return promise.catch(() => new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`failed: ${src}`));
          document.head.appendChild(script);
        }));
      }, Promise.reject(new Error("registry not loaded")));
    };
    const ensureRegistryUtils = () => {
      if (window.TabinoteArticleUtils) {
        return;
      }
      window.TABINOTE_STATUS_LABELS = window.TABINOTE_STATUS_LABELS || {
        draft: "下書き",
        review: "整文待ち",
        scheduled: "予約投稿",
        published: "公開中",
        hidden: "一覧非表示"
      };
      window.TabinoteArticleUtils = {
        isVisible(article, now = new Date()) {
          if (article.status === "published") return true;
          if (article.status === "scheduled" && article.publishAt) {
            return new Date(article.publishAt).getTime() <= now.getTime();
          }
          return false;
        },
        isListable(article, now = new Date()) {
          return this.isVisible(article, now) && article.status !== "hidden";
        },
        adminEnabled() {
          const params = new URLSearchParams(window.location.search);
          return params.get("admin") === "1" || window.location.hash === "#admin";
        },
        managementBadges(article) {
          return [
            { key: "status", label: window.TABINOTE_STATUS_LABELS[article.status] || article.status, tone: article.status },
            { key: "image", label: article.imageStatus === "done" ? "画像差し替え済み" : article.imageStatus === "temp" ? "仮画像のまま" : "画像未設定", tone: article.imageStatus },
            { key: "rewrite", label: article.rewriteStatus === "fixed" ? "整文済み" : article.rewriteStatus === "reviewed" ? "確認済み" : "整文待ち", tone: article.rewriteStatus },
            { key: "fact", label: article.factCheckStatus === "done" ? "事実確認済み" : "事実確認待ち", tone: article.factCheckStatus }
          ];
        }
      };
    };
    const loadRegistryJsonFallback = () => {
      if (window.TABINOTE_ARTICLES) {
        ensureRegistryUtils();
        return Promise.resolve();
      }
      const registryJsonUrl = window.location.protocol === "file:" ? "../article-registry.json" : "/article-registry.json";
      return fetch(registryJsonUrl)
        .then((response) => {
          if (!response.ok) {
            throw new Error(`failed: ${registryJsonUrl}`);
          }
          return response.json();
        })
        .then((articles) => {
          window.TABINOTE_ARTICLES = articles;
          ensureRegistryUtils();
        });
    };

    const escapeHtml = (value) => String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    const resolveArticleHref = (article) => {
      if (!article?.url) return "#";
      if (window.location.protocol === "file:") {
        return `.${article.url.replace("/articles", "")}`;
      }
      return article.url;
    };

    Promise.resolve()
      .then(() => (loadInlineRegistryData() ? undefined : loadRegistryScript()))
      .catch(() => loadRegistryJsonFallback())
      .then(() => {
      const allArticles = window.TABINOTE_ARTICLES || [];
      const { isListable, adminEnabled, managementBadges } = window.TabinoteArticleUtils || {};
      if (!allArticles.length || !isListable || !adminEnabled || !managementBadges) {
        articleList.innerHTML = '<p>記事データを読み込めませんでした。ブラウザを再読み込みしてください。</p>';
        return;
      }

      const adminMode = adminEnabled();
      if (adminMode) {
        document.body.classList.add("admin-mode");
      }

      const listableArticles = allArticles.filter((article) => isListable(article));
      const sortDate = (value) => value ? new Date(value).getTime() : 0;
      const statusOrder = {
        scheduled: 0,
        review: 1,
        hidden: 2,
        published: 3,
        draft: 4
      };
      const adminArticles = [...allArticles].sort((a, b) => {
        const statusDiff = (statusOrder[a.status] ?? 99) - (statusOrder[b.status] ?? 99);
        if (statusDiff !== 0) return statusDiff;
        return sortDate(b.publishAt || b.updatedAt || b.publishedAt) - sortDate(a.publishAt || a.updatedAt || a.publishedAt);
      });

      const renderRows = (items) => {
        articleList.innerHTML = items.map((article) => {
          const checked = article.qualityChecked ? " is-checked" : "";
          const badges = adminMode
            ? `<span class="management-badges">${managementBadges(article).map((badge) => `<span class="management-badge tone-${badge.tone}">${badge.label}</span>`).join("")}</span>`
            : "";
          return `
            <a class="article-row" href="${resolveArticleHref(article)}" data-status="${escapeHtml(article.status)}">
              <div class="article-title"><span class="review-dot${checked}"></span>${escapeHtml(article.title)}${badges}</div>
              <div class="article-meta">${escapeHtml(article.area)}</div>
              <div class="article-labels">${article.tags.map((tag) => `<span class="pill">${escapeHtml(tag)}</span>`).join("")}</div>
            </a>
          `;
        }).join("");
      };

      const matchesArea = (article, areaValue) => {
        if (areaValue === "all") return true;
        return article.area.includes(areaValue);
      };

      const matchesTag = (article, selectedTags) => {
        if (selectedTags.length === 0) return true;
        return selectedTags.every((selectedTag) => article.tags.some((tag) => tag.includes(selectedTag)));
      };

      const matchesKeyword = (article, keyword) => {
        if (!keyword) return true;
        const haystack = `${article.title} ${article.area} ${article.tags.join(" ")}`.toLowerCase();
        return haystack.includes(keyword.toLowerCase());
      };

      const applyFilters = () => {
        const keyword = keywordFilter.value.trim();
        const areaValue = areaFilter.value;
        const selectedTags = tagFilterButtons
          .filter((button) => button.getAttribute("aria-pressed") === "true")
          .map((button) => button.dataset.tag);
        const sourceItems = adminMode ? adminArticles : listableArticles;
        const filtered = sourceItems.filter((article) =>
          matchesKeyword(article, keyword) &&
          matchesArea(article, areaValue) &&
          matchesTag(article, selectedTags)
        );
        renderRows(filtered);
      };

      renderRows(adminMode ? adminArticles : listableArticles);
      keywordFilter.addEventListener("input", applyFilters);
      areaFilter.addEventListener("change", applyFilters);
      tagFilterGroup.addEventListener("click", (event) => {
        const target = event.target.closest("button");
        if (!target) return;
        if (target.dataset.clearTags === "true") {
          tagFilterButtons.forEach((button) => button.setAttribute("aria-pressed", "false"));
          applyFilters();
          return;
        }
        const isPressed = target.getAttribute("aria-pressed") === "true";
        target.setAttribute("aria-pressed", isPressed ? "false" : "true");
        applyFilters();
      });
    }).catch(() => {
      articleList.innerHTML = '<p>記事データを読み込めませんでした。ブラウザを再読み込みしてください。</p>';
    });
  </script>
</body>
</html>
